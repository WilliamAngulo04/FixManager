<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Perfil - Fix Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow border-0 max-width: 600px; margin: auto;">
            <div class="card-header bg-dark text-white text-center py-4">
                <h4>Información de Usuario</h4>
            </div>
            <div class="card-body p-4">
                <div class="mb-3"><strong>Nombre:</strong> {{ user.nombre_completo }}</div>
                <div class="mb-3"><strong>Usuario:</strong> {{ user.username }}</div>
                <div class="mb-3"><strong>Rol:</strong> <span class="badge bg-primary">{{ user.role }}</span></div>
                <div class="mb-3"><strong>Sede:</strong> {{ user.sucursal.nombre_sucursal }}</div>
                <hr>
                <a href="/" class="btn btn-outline-secondary w-100">Volver al Panel</a>
            </div>
        </div>
    </div>
</body>
</html>
